# Production profile: middleware hosts resolved via env vars (set by Docker/K8s).
# Activate with: --spring.profiles.active=prod

spring:
  datasource:
    url: "jdbc:mysql://${MYSQL_HOST:mysql}:${MYSQL_PORT:3306}/repolens?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true"
    username: ${MYSQL_USER:repolens}
    password: ${MYSQL_PASSWORD:repolens123}
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}

rocketmq:
  name-server: ${ROCKETMQ_NAME_SERVER:rocketmq-namesrv:9876}

repolens:
  milvus:
    host: ${REPOLENS_MILVUS_HOST:milvus}
    port: ${REPOLENS_MILVUS_PORT:19530}

# In prod: disable SQL logging entirely
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
