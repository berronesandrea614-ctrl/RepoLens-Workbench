# Dev profile: enables SQL logging via Slf4jImpl.
# application.yml default is NoLoggingImpl; this profile override makes the
# "dev profile overrides to Slf4jImpl" comment in application.yml actually real.
#
# Activate with: -Dspring.profiles.active=dev  or  SPRING_PROFILES_ACTIVE=dev
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
