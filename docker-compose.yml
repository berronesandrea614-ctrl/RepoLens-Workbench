services:
  mysql:
    image: mysql:8.0
    container_name: repolens-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      TZ: Asia/Shanghai
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-proot123" ]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.2-alpine
    container_name: repolens-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: [ "redis-server", "--appendonly", "yes" ]
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  rocketmq-namesrv:
    image: apache/rocketmq:5.3.1
    container_name: repolens-rocketmq-namesrv
    restart: unless-stopped
    ports:
      - "9876:9876"
    command: [ "sh", "mqnamesrv" ]
    mem_limit: 512m
    healthcheck:
      test: [ "CMD-SHELL", "nc -z localhost 9876 || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 5

  rocketmq-broker:
    image: apache/rocketmq:5.3.1
    container_name: repolens-rocketmq-broker
    restart: unless-stopped
    depends_on:
      - rocketmq-namesrv
    ports:
      - "10911:10911"
      - "10909:10909"
      - "10912:10912"
    environment:
      NAMESRV_ADDR: rocketmq-namesrv:9876
    command: [ "sh", "mqbroker", "-n", "rocketmq-namesrv:9876", "-c", "/home/rocketmq/rocketmq-5.3.1/conf/broker.conf" ]
    volumes:
      - ./docker/rocketmq/broker.conf:/home/rocketmq/rocketmq-5.3.1/conf/broker.conf
    mem_limit: 512m

  etcd:
    image: quay.io/coreos/etcd:v3.5.12
    container_name: repolens-etcd
    restart: unless-stopped
    command:
      - etcd
      - --advertise-client-urls=http://127.0.0.1:2379
      - --listen-client-urls=http://0.0.0.0:2379
      - --data-dir=/etcd
    ports:
      - "2379:2379"
    volumes:
      - etcd_data:/etcd
    healthcheck:
      test: [ "CMD", "etcdctl", "endpoint", "health" ]
      interval: 15s
      timeout: 10s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2024-09-13T20-26-02Z
    container_name: repolens-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: [ "minio", "server", "/minio_data", "--console-address", ":9001" ]
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/minio_data
    healthcheck:
      test: [ "CMD", "mc", "ready", "local" ]
      interval: 15s
      timeout: 10s
      retries: 5

  milvus:
    image: milvusdb/milvus:v2.4.15
    container_name: repolens-milvus
    restart: unless-stopped
    command: [ "milvus", "run", "standalone" ]
    depends_on:
      - etcd
      - minio
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus_data:/var/lib/milvus
    mem_limit: 2g
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9091/healthz" ]
      interval: 30s
      timeout: 10s
      retries: 5

  # ---- Application service ----
  # By default NOT started with `docker compose up` (profiles: ["app"]).
  # Use `docker compose --profile app up` to start the full stack including the backend.
  # Development workflow keeps middleware in docker + backend on the host JVM.
  app:
    build: .
    image: repolens-app:latest
    container_name: repolens-app
    profiles: [ "app" ]
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      milvus:
        condition: service_started
      rocketmq-namesrv:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      # Override localhost with Docker service names
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/repolens?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true"
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      REPOLENS_MILVUS_HOST: milvus
      REPOLENS_MILVUS_PORT: 19530
      ROCKETMQ_NAME_SERVER: rocketmq-namesrv:9876
      # LLM config — supply at runtime (e.g. via .env or environment)
      REPOLENS_LLM_PROVIDER: ${REPOLENS_LLM_PROVIDER:-mock}
      REPOLENS_LLM_BASE_URL: ${REPOLENS_LLM_BASE_URL:-}
      REPOLENS_LLM_API_KEY: ${REPOLENS_LLM_API_KEY:-}
      REPOLENS_LLM_MODEL_NAME: ${REPOLENS_LLM_MODEL_NAME:-mock-code-assistant}
      REPOLENS_AGENT_ENABLED: "true"
      # Storage
      REPOLENS_REPO_STORAGE_ROOT: /app/workspace/repos
    volumes:
      - app_workspace:/app/workspace
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  mysql_data:
  redis_data:
  etcd_data:
  minio_data:
  milvus_data:
  app_workspace:
